# ~/.config/yazi/theme.toml

[manager]
# Using the bright Cyberdream blue for the current working directory
cwd = { fg = "#5ea1ff" } 

# Hovered item: Dark text on the Cyberdream orange/yellow accent
hovered         = { fg = "#16181a", bg = "#ffbd5e" }
# Selected items
preview_hovered = { underline = true }

[status]
separator_open  = ""
separator_close = ""

[status.mode]
# Mode colors using the Cyberdream Blue, Green, and Purple
normal = { bg = "#5ea1ff", fg = "#16181a", bold = true }
select = { bg = "#5eff6c", fg = "#16181a", bold = true }
unset  = { bg = "#bd5eff", fg = "#16181a", bold = true }

[filetype]
rules = [
    # Media: Using the Cyberdream Purple
    { mime = "image/*", fg = "#bd5eff" }, 
    { mime = "video/*", fg = "#bd5eff" },
    { mime = "audio/*", fg = "#bd5eff" },
    
    # Text: Pure white for maximum readability
    { mime = "text/*",  fg = "#ffffff" },
    
    # Archives: Using the Cyberdream Yellow
    { name = "*.zip",   fg = "#f1ff5e" }, 
    { name = "*.tar",   fg = "#f1ff5e" },
    { name = "*.gz",    fg = "#f1ff5e" },
    { name = "*.7z",    fg = "#f1ff5e" },
]
