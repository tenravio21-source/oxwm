# ~/.config/bottom/bottom.toml

[colors]
# Main Background and Text
# Cyberdream Blue for headers and White for general text
table_header_color = "#5ea1ff"
text_color = "#ffffff"

# CPU Colors
# Using the Neon Red and Purple for the main CPU metrics
all_cpu_color = "#ff6e5e"
avg_cpu_color = "#bd5eff"
# Cycling through the full Cyberdream neon spectrum for cores
cpu_core_colors = ["#ff6e5e", "#5eff6c", "#f1ff5e", "#5ea1ff", "#bd5eff", "#5ef1ff"]

# Memory and Network
ram_color = "#5eff6c"          # Neon Green
cache_color = "#5ef1ff"        # Cyan
swap_color = "#f1ff5e"         # Neon Yellow
rx_color = "#5eff6c"           # Green for receiving
tx_color = "#ff6e5e"           # Red for transmitting

# Borders and Selection
# Subtle grey for borders, popping Blue for the active pane
border_color = "#3c4048" 
highlighted_border_color = "#5ea1ff"

# Selection Styles
# White text on the Cyberdream Blue background for high visibility
selected_text_color = "#16181a"
selected_bg_color = "#5ea1ff"

# Graphing
# Using the selection grey for the graph lines to keep it clean
graph_color = "#3c4048"
